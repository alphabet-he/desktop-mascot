<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Dialogue Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="panel-shared.css">
    <style>
        html {
            background-color: #a18cd1;
            /* Default background color */
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: #333;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #content {
            padding: 25px;
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 28px;
            color: #111;
            margin-top: 0;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .help-text {
            font-size: 13px;
            color: #555;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 500;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 15px;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.6);
            color: #111;
            transition: all 0.2s;
            outline: none;
        }

        textarea:focus {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.3);
        }

        /* Hide All Scrollbars Globally */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .actions {
            display: flex;
            align-items: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        button {
            font-family: inherit;
            background: rgba(255, 255, 255, 0.7);
            color: #111;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0);
        }

        #status {
            margin-left: 15px;
            font-weight: 700;
            color: #2d6a4f;
            background: rgba(216, 243, 220, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <div id="title-bar">
        <div id="close-btn" onclick="window.close()">×</div>
    </div>

    <div id="bg-image-container">
        <img id="bg-image" src="" style="display: none;">
    </div>
    <div id="glass-layer"></div>

    <div id="content">
        <h1>Dialogue Editor</h1>
        <p class="help-text">Enter one dialogue per line.</p>

        <div class="form-group">
            <label>Startup Dialogues</label>
            <textarea id="dialogue-startup"></textarea>
        </div>

        <div class="form-group">
            <label>Normal Dialogues</label>
            <textarea id="dialogue-normal"></textarea>
        </div>

        <div class="form-group">
            <label>Idle Dialogues</label>
            <textarea id="dialogue-idle"></textarea>
        </div>

        <div class="form-group">
            <label>Quit Dialogues</label>
            <textarea id="dialogue-quit"></textarea>
        </div>

        <div class="actions">
            <button id="save-btn">Save Changes</button>
            <span id="status">✓ Saved successfully!</span>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const path = require('path');
        const { applyPanelConfig } = require('./panel-config.js');

        let currentConfigPath = null;
        let configData = null;

        async function loadConfig() {
            const result = await applyPanelConfig('edit_dialogue_panel');
            currentConfigPath = result.currentConfigPath;
            configData = result.configData;

            document.getElementById('dialogue-startup').value = (configData.dialogue_startup || []).join('\n');
            document.getElementById('dialogue-normal').value = (configData.dialogue || []).join('\n');
            document.getElementById('dialogue-idle').value = (configData.dialogue_idle || []).join('\n');
            document.getElementById('dialogue-quit').value = (configData.dialogue_quit || []).join('\n');
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            if (!configData || !currentConfigPath) return;

            const parseArray = (text) => text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            configData.dialogue_startup = parseArray(document.getElementById('dialogue-startup').value);
            configData.dialogue = parseArray(document.getElementById('dialogue-normal').value);
            configData.dialogue_idle = parseArray(document.getElementById('dialogue-idle').value);
            configData.dialogue_quit = parseArray(document.getElementById('dialogue-quit').value);

            const result = await ipcRenderer.invoke('save-config', { confPath: currentConfigPath, confData: configData });

            if (result.success) {
                const status = document.getElementById('status');
                status.style.opacity = '1';
                setTimeout(() => { status.style.opacity = '0'; }, 2000);
            } else {
                alert("Failed to save: " + result.error);
            }
        });

        loadConfig();
    </script>
</body>

</html>
