<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Data Dashboard</title>
    <!-- Use Outfit font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="panel-shared.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html {
            background-color: transparent;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
        }



        #app {
            padding: 0 40px 30px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow-y: auto;
            height: calc(100vh - 32px);
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }



        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        .header {
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 5px 0;
            color: #111;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 16px;
            font-weight: 500;
            margin: 0;
            color: #555;
        }

        .nav-pills {
            display: flex;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            padding: 6px;
            gap: 6px;
            margin-bottom: 25px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn.active {
            background: #fff;
            color: #111;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
            flex-direction: column;
            flex-grow: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .overview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            min-width: 0;
            overflow: hidden;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            text-transform: uppercase;
        }

        .stat-title {
            font-size: 13px;
            font-weight: 800;
            color: #333;
            letter-spacing: 1px;
        }

        .icon-svg {
            width: 20px;
            height: 20px;
            stroke: #999;
            stroke-width: 1.5;
            fill: none;
        }

        .stat-value {
            font-size: 42px;
            font-weight: 800;
            color: #111;
            margin-top: 10px;
            line-height: 1;
        }

        .stat-subtitle {
            font-size: 14px;
            font-weight: 500;
            color: #777;
            margin-top: 15px;
        }

        .word-cloud-card {
            padding-bottom: 30px;
            overflow: hidden;
        }

        .overview-grid .word-cloud-card {
            grid-column: 1 / -1;
        }

        .wc-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .wc-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .sub-nav {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .sub-nav-pills {
            display: flex;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
            /* backdrop-filter: blur(12px); */
        }

        .sub-nav-btn {
            padding: 8px 32px;
            border: none;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s;
        }

        .sub-nav-btn.active {
            background: #f66d6d;
            color: #fff;
        }

        .chart-card {
            margin-bottom: 20px;
            padding-bottom: 20px;
        }

        .notebook-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .notebook-top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .notebook-top-row>* {
            min-width: 0;
        }

        .notebook-top-row .word-cloud-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .notebook-top-row .wc-container {
            height: 200px;
        }

        /* Calendar Widget */
        .calendar-widget {
            padding: 16px;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cal-header .cal-title {
            font-size: 15px;
            font-weight: 800;
            color: #333;
        }

        .cal-nav {
            background: none;
            border: none;
            font-size: 18px;
            font-weight: 700;
            color: #999;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            transition: all 0.15s;
            font-family: 'Outfit', sans-serif;
        }

        .cal-nav:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #333;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .cal-dow {
            font-size: 11px;
            font-weight: 700;
            color: #aaa;
            padding: 4px 0;
            text-transform: uppercase;
        }

        .cal-day {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            padding: 6px 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            background: none;
            font-family: 'Outfit', sans-serif;
        }

        .cal-day:hover {
            background: rgba(246, 109, 109, 0.15);
        }

        .cal-day.empty {
            cursor: default;
        }

        .cal-day.empty:hover {
            background: none;
        }

        .cal-day.in-range {
            background: rgba(246, 109, 109, 0.15);
            color: #333;
        }

        .cal-day.range-start,
        .cal-day.range-end {
            background: #f66d6d;
            color: #fff;
            font-weight: 800;
        }

        .cal-day.today {
            border: 2px solid #f66d6d;
        }

        .cal-day.other-month {
            color: #ccc;
        }

        .message-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 50px;
        }

        .message-item {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .msg-user {
            font-size: 15px;
            font-weight: 800;
            color: #111;
        }

        .msg-time {
            font-size: 13px;
            font-weight: 700;
            color: #999;
        }

        .msg-text {
            font-size: 16px;
            font-weight: 500;
            color: #444;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div id="title-bar">
        <div id="close-btn" onclick="window.close()">×</div>
    </div>

    <div id="bg-image-container">
        <img id="bg-image" src="" style="display: none;">
    </div>
    <!-- <div id="glass-layer"></div> -->

    <div id="app">
        <div class="header">
            <h1>Data Dashboard</h1>
            <p>Your desktop companion metrics.</p>
        </div>

        <div class="nav-pills">
            <button class="nav-btn active" onclick="switchTab('overview')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-svg">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg> Overview
            </button>
            <button class="nav-btn" onclick="switchTab('activity')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-svg">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg> Activity
            </button>
            <button class="nav-btn" onclick="switchTab('notebook')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-svg">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg> Notebook
            </button>
        </div>

        <div id="main-content">
            <!-- OVERVIEW TAB -->
            <div id="overview-tab" class="tab-content active">
                <div class="overview-grid">
                    <div class="card stat-card">
                        <div class="stat-header">
                            <span class="stat-title">TODAY'S CLICKS</span>
                            <svg class="icon-svg" viewBox="0 0 24 24">
                                <rect x="5" y="2" width="14" height="20" rx="7" />
                                <path d="M12 2v6" />
                            </svg>
                        </div>
                        <div class="stat-value" id="today-clicks">0</div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-header">
                            <span class="stat-title">TODAY'S NOTES</span>
                            <svg class="icon-svg" viewBox="0 0 24 24">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                            </svg>
                        </div>
                        <div class="stat-value" id="today-notes">0</div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-header">
                            <span class="stat-title">PEAK ENGAGEMENT</span>
                            <svg class="icon-svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                        <div class="stat-value" id="peak-engagement">--:--</div>
                        <div class="stat-subtitle">Most active hour today</div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-header">
                            <span class="stat-title">TODAY'S TREND</span>
                        </div>
                        <div class="stat-subtitle"
                            style="margin-top: 5px; margin-bottom: 10px; font-size:16px; font-weight: 700; color:#111;">
                            Activity Flow</div>
                        <div style="height: 60px; position:relative;">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="card word-cloud-card">
                    <div class="stat-title" style="margin-bottom: 15px;">WORD CLOUD</div>
                    <div class="wc-container" id="wordcloud-container">
                        <canvas id="wordcloud-canvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- ACTIVITY TAB -->
            <div id="activity-tab" class="tab-content">
                <div class="sub-nav">
                    <div class="sub-nav-pills">
                        <button class="sub-nav-btn active" id="btn-day" onclick="setActivityRange('day')">Day</button>
                        <button class="sub-nav-btn" id="btn-week" onclick="setActivityRange('week')">Week</button>
                        <button class="sub-nav-btn" id="btn-month" onclick="setActivityRange('month')">Month</button>
                    </div>
                </div>

                <div class="card chart-card">
                    <div class="stat-title" style="margin-bottom: 10px;">INTERACTION TIMELINE</div>
                    <div style="height: 250px; position:relative; margin-top:20px;">
                        <canvas id="timelineChart"></canvas>
                    </div>
                </div>

                <div class="card chart-card" id="peak-hour-card">
                    <div class="stat-header" style="justify-content: flex-start; gap: 10px; margin-bottom: 10px;">
                        <span class="stat-title">PEAK ENGAGEMENT HOUR</span>
                    </div>
                    <div class="stat-subtitle" style="margin-top: 5px; margin-bottom: 20px;">Cumulative activity across
                        the selected period.</div>
                    <div style="height: 250px; position:relative;">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- NOTEBOOK TAB -->
            <div id="notebook-tab" class="tab-content">
                <div class="notebook-layout">
                    <div class="notebook-top-row">
                        <div class="card calendar-widget">
                            <div class="cal-header">
                                <button class="cal-nav" onclick="calPrevMonth()">‹</button>
                                <span class="cal-title" id="cal-month-title"></span>
                                <button class="cal-nav" onclick="calNextMonth()">›</button>
                            </div>
                            <div class="cal-grid" id="cal-grid"></div>
                        </div>
                        <div class="card word-cloud-card">
                            <div class="wc-container" id="nb-wordcloud-container">
                                <canvas id="nb-wordcloud-canvas"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="message-list" id="messageList">
                        <!-- Messages populated via JS -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- MAIN SCRIPT -->
    <script>
        const { ipcRenderer } = require('electron');
        const WordCloud = require('wordcloud');
        const { applyPanelConfig } = require('./panel-config.js');

        let globalData = { clicks: {}, inputs: [] };
        let trendChartInst = null;
        let timelineChartInst = null;
        let barChartInst = null;
        let currentActivityRange = 'day'; // day, week, month
        let wordcloudDrawn = false;

        // Calendar state
        let calYear, calMonth; // currently displayed month
        let calRangeStart = null; // Date obj
        let calRangeEnd = null;   // Date obj
        let calClickState = 0;    // 0 = next click sets start, 1 = next click sets end

        const C_RED = '#f66d6d';
        const C_BLUE = '#7ba1c2';

        let stopWordsSet = new Set();

        // Pre-indexed click data: Map<dateStr, Map<hour, count>>
        let clicksByDate = new Map();

        function buildClickIndex() {
            clicksByDate = new Map();
            Object.keys(globalData.clicks).forEach(k => {
                const dateStr = k.substring(0, 10);
                const hr = parseInt(k.substring(11, 13));
                const count = globalData.clicks[k];
                if (!clicksByDate.has(dateStr)) clicksByDate.set(dateStr, new Map());
                const hourMap = clicksByDate.get(dateStr);
                hourMap.set(hr, (hourMap.get(hr) || 0) + count);
            });
        }

        async function init() {
            const list = await ipcRenderer.invoke('get-stopwords');
            stopWordsSet = new Set(list);

            await applyPanelConfig('dashboard_panel');

            globalData = await ipcRenderer.invoke('get-data');

            Chart.defaults.font.family = "'Outfit', sans-serif";
            Chart.defaults.color = "#999";
            buildClickIndex();

            const today = new Date();
            const startDay = new Date(today);
            startDay.setDate(startDay.getDate() - 7);
            calRangeStart = startDay;
            calRangeEnd = today;
            calYear = today.getFullYear();
            calMonth = today.getMonth();

            renderOverview();
            // Removed initActivityCharts() from here to lazy-load it instead
            renderCalendar();
            updateMessages();
        }

        // --- NAVIGATION ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(`${tabId}-tab`).classList.add('active');
            event.currentTarget.classList.add('active');

            if (tabId === 'overview' && !wordcloudDrawn) {
                renderOverviewWordCloud();
            } else if (tabId === 'overview') {
                window.dispatchEvent(new Event('resize'));
            } else if (tabId === 'activity') {
                // Lazy-load activity charts on first view
                if (!timelineChartInst) {
                    initActivityCharts();
                }
                renderActivity();
                // Help Chart.js detect container size after switching from hidden
                setTimeout(() => window.dispatchEvent(new Event('resize')), 0);
            } else if (tabId === 'notebook') {
                updateMessages();
            }
        }

        function setActivityRange(range) {
            currentActivityRange = range;
            document.querySelectorAll('.sub-nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${range}`).classList.add('active');
            renderActivity();
        }

        // --- DATA HELPERS ---
        function getLocalDateStr(d) {
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        }

        function getKeysInRange(days) {
            const keys = [];
            const today = new Date();
            for (let i = days - 1; i >= 0; i--) {
                let d = new Date(today);
                d.setDate(d.getDate() - i);
                keys.push(getLocalDateStr(d));
            }
            return keys;
        }

        // --- OVERVIEW TAB ---
        function renderOverview() {
            const todayStr = getLocalDateStr(new Date());

            let todayClicks = 0;
            let todayNotes = 0;
            let hourCounts = Array(24).fill(0);

            // Use pre-indexed click data for O(1) lookup
            const todayClickMap = clicksByDate.get(todayStr);
            if (todayClickMap) {
                todayClickMap.forEach((count, hr) => {
                    todayClicks += count;
                    hourCounts[hr] += count;
                });
            }

            // globalData.inputs Time: "YYYY-MM-DD-HH:mm:ss"
            globalData.inputs.forEach(i => {
                if (i.time.startsWith(todayStr)) {
                    todayNotes++;
                    const hr = parseInt(i.time.substring(11, 13));
                    hourCounts[hr]++;
                }
            });

            document.getElementById('today-clicks').innerText = todayClicks;
            document.getElementById('today-notes').innerText = todayNotes;

            const maxAct = Math.max(...hourCounts);
            if (maxAct === 0) {
                document.getElementById('peak-engagement').innerText = '--:--';
            } else {
                const peakHr = hourCounts.indexOf(maxAct);
                document.getElementById('peak-engagement').innerText = `${String(peakHr).padStart(2, '0')}:00`;
            }

            // Trend Chart — update in-place if already created
            if (trendChartInst) {
                trendChartInst.data.datasets[0].data = hourCounts;
                trendChartInst.update();
            } else {
                const ctxTrend = document.getElementById('trendChart').getContext('2d');
                let gradient = ctxTrend.createLinearGradient(0, 0, 0, 60);
                gradient.addColorStop(0, 'rgba(246, 109, 109, 0.4)');
                gradient.addColorStop(1, 'rgba(246, 109, 109, 0.0)');

                trendChartInst = new Chart(ctxTrend, {
                    type: 'line',
                    data: {
                        labels: Array.from({ length: 24 }, (_, i) => i),
                        datasets: [{
                            data: hourCounts,
                            borderColor: C_RED,
                            backgroundColor: gradient,
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { enabled: false } },
                        scales: {
                            x: { display: false },
                            y: { display: false, min: 0 }
                        },
                        layout: { padding: 0 }
                    }
                });
            }

            renderOverviewWordCloud();
        }

        function drawWordCloud(canvasId, containerId, inputs, wordCnt, sizeMultiplier, sizeOffset, gridSize, callback = null) {
            setTimeout(() => {
                const wc = document.getElementById(canvasId);
                const container = document.getElementById(containerId);
                const rect = container.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                const cssW = Math.floor(rect.width);
                const cssH = Math.floor(rect.height);

                wc.width = cssW * dpr;
                wc.height = cssH * dpr;
                wc.style.width = cssW + 'px';
                wc.style.height = cssH + 'px';

                if (wc.width === 0 || wc.height === 0) return;

                let wordsMap = {};
                // Cache the segmenter to avoid expensive re-creation
                if (!window.wcSegmenter) {
                    window.wcSegmenter = new Intl.Segmenter(undefined, { granularity: 'word' });
                }

                inputs.forEach(inp => {
                    const segments = window.wcSegmenter.segment(inp.text);
                    for (const { segment, isWordLike } of segments) {
                        const isCJK = /[\u4e00-\u9fff\u3400-\u4dbf]/.test(segment);
                        if (isWordLike && !stopWordsSet.has(segment) && (segment.length >= 2 || isCJK)) {
                            wordsMap[segment] = (wordsMap[segment] || 0) + 1;
                        }
                    }
                });

                let list = Object.keys(wordsMap).map(k => [k, wordsMap[k] * sizeMultiplier + sizeOffset]);
                list.sort((a, b) => b[1] - a[1]);
                list = list.slice(0, wordCnt);

                if (list.length === 0) list = [['No data', 30]];

                const colors = ['#f66d6d', '#ecaf66', '#8ab498', '#7ba1c2', '#bd9fb7'];

                try {
                    WordCloud(wc, {
                        list: list,
                        fontFamily: 'Outfit, sans-serif',
                        fontWeight: 700,
                        color: () => colors[Math.floor(Math.random() * colors.length)],
                        rotateRatio: 0,
                        backgroundColor: 'transparent',
                        shrinkToFit: true,
                        gridSize: gridSize
                    });
                } catch (e) { }

                if (callback) callback();
            }, 100);
        }

        function renderOverviewWordCloud(wordCnt = 40) {
            drawWordCloud('wordcloud-canvas', 'wordcloud-container', globalData.inputs, wordCnt, 12, 16, 10, () => {
                wordcloudDrawn = true;
            });
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('overview-tab').classList.contains('active')) {
                clearTimeout(window.resizeTimer);
                window.resizeTimer = setTimeout(() => { renderOverviewWordCloud(); }, 200);
            }
        });

        // --- ACTIVITY TAB ---
        // Create charts once, then update data in-place
        function initActivityCharts() {
            const ctxLine = document.getElementById('timelineChart').getContext('2d');
            let gradBg = ctxLine.createLinearGradient(0, 0, 0, 250);
            gradBg.addColorStop(0, 'rgba(246, 109, 109, 0.15)');
            gradBg.addColorStop(1, 'rgba(246, 109, 109, 0.0)');

            timelineChartInst = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Clicks', data: [], borderColor: C_RED, backgroundColor: gradBg, fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0, pointHoverRadius: 5 },
                        { label: 'Dialogues', data: [], borderColor: C_BLUE, backgroundColor: 'transparent', fill: false, tension: 0.4, borderWidth: 3, pointRadius: 0, pointHoverRadius: 5 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8, font: { family: "Outfit", weight: '600' } } }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: "Outfit" } } },
                        y: { border: { dash: [4, 4] }, grid: { color: 'rgba(0,0,0,0.05)', tickBorderDash: [4, 4] }, ticks: { stepSize: 15, font: { family: "Outfit" } }, beginAtZero: true }
                    }
                }
            });

            const ctxBar = document.getElementById('barChart').getContext('2d');
            barChartInst = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0') + ':00'),
                    datasets: [
                        { label: 'Clicks', data: Array(24).fill(0), backgroundColor: C_RED, borderRadius: 4, barPercentage: 0.6 },
                        { label: 'Dialogues', data: Array(24).fill(0), backgroundColor: C_BLUE, borderRadius: 4, barPercentage: 0.6 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8, font: { family: "Outfit", weight: '600' } } } },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { maxTicksLimit: 12, font: { family: "Outfit" } } },
                        y: { stacked: true, border: { dash: [4, 4] }, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { stepSize: 15, font: { family: "Outfit" } }, beginAtZero: true }
                    }
                }
            });
        }

        function renderActivity() {
            let labels = [];
            let clicksData = [];
            let dialogsData = [];
            let barClicks = Array(24).fill(0);
            let barDialogs = Array(24).fill(0);

            if (currentActivityRange === 'day') {
                const todayStr = getLocalDateStr(new Date());
                labels = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0') + ':00');
                clicksData = Array(24).fill(0);
                dialogsData = Array(24).fill(0);

                // Use pre-indexed click data
                const todayClickMap = clicksByDate.get(todayStr);
                if (todayClickMap) {
                    todayClickMap.forEach((count, hr) => {
                        clicksData[hr] += count;
                        barClicks[hr] += count;
                    });
                }
                globalData.inputs.forEach(i => {
                    if (i.time.startsWith(todayStr)) {
                        const hr = parseInt(i.time.substring(11, 13));
                        dialogsData[hr]++;
                        barDialogs[hr]++;
                    }
                });
            } else {
                const days = currentActivityRange === 'week' ? 7 : 30;
                const dateKeys = getKeysInRange(days); // e.g. ["2026-03-24", ...]
                clicksData = Array(days).fill(0);
                dialogsData = Array(days).fill(0);

                dateKeys.forEach((dateStr, idx) => {
                    // Use pre-indexed click data — O(hours) per day instead of O(allKeys)
                    const dayClickMap = clicksByDate.get(dateStr);
                    if (dayClickMap) {
                        dayClickMap.forEach((count, hr) => {
                            clicksData[idx] += count;
                            barClicks[hr] += count;
                        });
                    }
                    globalData.inputs.forEach(i => {
                        if (i.time.startsWith(dateStr)) {
                            dialogsData[idx]++;
                            const hr = parseInt(i.time.substring(11, 13));
                            barDialogs[hr]++;
                        }
                    });
                });

                // Format labels for timeline "MM/DD"
                labels = dateKeys.map(l => {
                    const d = new Date(l);
                    return `${d.getMonth() + 1}/${d.getDate()}`;
                });
            }

            // Update charts in-place (no destroy/recreate)
            timelineChartInst.data.labels = labels;
            timelineChartInst.data.datasets[0].data = clicksData;
            timelineChartInst.data.datasets[1].data = dialogsData;
            timelineChartInst.update();

            barChartInst.data.datasets[0].data = barClicks;
            barChartInst.data.datasets[1].data = barDialogs;
            barChartInst.update();
        }

        // --- NOTEBOOK TAB ---

        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const DOW = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];

        function renderCalendar() {
            document.getElementById('cal-month-title').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';

            // Day-of-week headers
            DOW.forEach(d => {
                const el = document.createElement('div');
                el.className = 'cal-dow';
                el.textContent = d;
                grid.appendChild(el);
            });

            const firstDay = new Date(calYear, calMonth, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const todayStr = getLocalDateStr(new Date());

            // Empty cells before first day
            for (let i = 0; i < firstDay; i++) {
                const el = document.createElement('div');
                el.className = 'cal-day empty';
                grid.appendChild(el);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const btn = document.createElement('button');
                btn.className = 'cal-day';
                btn.textContent = day;

                const cellDate = new Date(calYear, calMonth, day);
                const cellStr = getLocalDateStr(cellDate);

                if (cellStr === todayStr) btn.classList.add('today');

                if (calRangeStart && calRangeEnd) {
                    const startStr = getLocalDateStr(calRangeStart);
                    const endStr = getLocalDateStr(calRangeEnd);
                    if (cellStr === startStr) btn.classList.add('range-start');
                    if (cellStr === endStr) btn.classList.add('range-end');
                    if (cellStr > startStr && cellStr < endStr) btn.classList.add('in-range');
                } else if (calRangeStart) {
                    const startStr = getLocalDateStr(calRangeStart);
                    if (cellStr === startStr) btn.classList.add('range-start');
                }

                btn.addEventListener('click', () => calDayClicked(cellDate));
                grid.appendChild(btn);
            }
        }

        function calDayClicked(date) {
            if (calClickState === 0) {
                calRangeStart = date;
                calRangeEnd = null;
                calClickState = 1;
                renderCalendar();
            } else {
                calRangeEnd = date;
                calClickState = 0;
                // Auto-swap if end < start
                if (calRangeEnd < calRangeStart) {
                    [calRangeStart, calRangeEnd] = [calRangeEnd, calRangeStart];
                }
                renderCalendar();
                updateMessages();
            }
        }

        function calPrevMonth() {
            calMonth--;
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCalendar();
        }

        function calNextMonth() {
            calMonth++;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            renderCalendar();
        }

        function updateMessages() {
            const startStr = calRangeStart ? getLocalDateStr(calRangeStart) : null;
            const endStr = calRangeEnd ? getLocalDateStr(calRangeEnd) : null;

            let filtered = globalData.inputs.slice();

            if (startStr) {
                filtered = filtered.filter(i => i.time.substring(0, 10) >= startStr);
            }
            if (endStr) {
                filtered = filtered.filter(i => i.time.substring(0, 10) <= endStr);
            }

            // Render notebook word cloud from same filtered data
            renderNotebookWordCloud(filtered);

            filtered.reverse(); // newest first
            const listEl = document.getElementById('messageList');
            listEl.innerHTML = '';

            if (filtered.length === 0) {
                listEl.innerHTML = '<div style="color:#999;font-weight:600;margin-top:20px;">No messages found.</div>';
                return;
            }

            filtered.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'message-item';

                const parts = msg.time.split('-');
                let prettyTime = msg.time;
                if (parts.length >= 4) {
                    const isoStr = `${parts[0]}-${parts[1]}-${parts[2]}T${parts[3]}`;
                    const d = new Date(isoStr);
                    if (!isNaN(d)) {
                        prettyTime = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
                    }
                }

                item.innerHTML = `
                    <div class="msg-text">${msg.text}</div>
                    <div class="msg-header" style="justify-content: flex-end; margin-top: 5px;">
                        <div class="msg-time" style="font-size: 12px; font-weight: 500;">${prettyTime}</div>
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        function renderNotebookWordCloud(filteredInputs) {
            drawWordCloud('nb-wordcloud-canvas', 'nb-wordcloud-container', filteredInputs, 20, 8, 10, 8);
        }

        init();
    </script>
</body>

</html>
